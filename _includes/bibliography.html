{% if page.references %}
<section class="bibliography mt-5 pt-4 border-top">
  <h4 class="mb-3 text-secondary" style="font-size: 1.1rem; text-transform: uppercase;">
    References
  </h4>
  <ul class="list-unstyled">
    {% for id in include.links %}
    {% assign citation_match = site.data.references | where: "id", id | first %}

    {% if citation_match %}
    <li class="mb-2 text-muted" style="font-size: 0.9rem; padding-left: 1.5rem; text-indent: -1.5rem;">
      {{ citation_match.citation }}
    </li>
    {% endif %}
    {% endfor %}
  </ul>
</section>
{% endif %}
