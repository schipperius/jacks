{% assign chapter = include.chapter %}

<div class="chapter-header-block mb-4 mt-5">
  <div class="row g-0 rounded shadow-sm overflow-hidden bg-white border">

    <div class="col-md-5 col-lg-4">
      <div class="header-map-wrapper h-100">
        <img src="{{ chapter.image | relative_url }}" class="img-fluid h-100 w-100"
          style="object-fit: cover; min-height: 250px;" alt="Map of {{ chapter.title }}">
      </div>
    </div>

    <div class="col-md-7 col-lg-8 p-4 d-flex flex-column justify-content-center">
      <div class="chapter-meta mb-2">
        <span class="badge bg-dark-subtle text-dark border fw-normal">
          Part {{ chapter.part_number }}
        </span>
        <span class="text-uppercase small fw-bold ms-2 text-muted" style="letter-spacing: 1px;">
          Thebes-Farshût Line
        </span>
      </div>

      <h2 class="serif-font display-6 mb-3">
        <a href="{{ chapter.url | relative_url }}" class="text-decoration-none text-dark">
          Chapter {{ chapter.chapter_number }}: {{ chapter.title }}
        </a>
      </h2>

      <div class="chapter-excerpt small-serif text-muted" style="font-size: 1.1rem; line-height: 1.5;">
        {{ chapter.content | strip_html | truncatewords: 35 }}
      </div>

      <div class="mt-3">
        <a href="{{ chapter.url | relative_url }}"
          class="btn btn-sm btn-link ps-0 text-dark fw-bold text-decoration-none">
          View Chapter Map & Context <i class="bi bi-arrow-right ms-1"></i>
        </a>
      </div>
    </div>
  </div>
</div>
