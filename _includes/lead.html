<!-- Lead Section -->
<section class="my-5 py-4" id="entry-header">
  <div class="container col-xxl-12 px-4">
    <div class="row align-items-center g-5">
      
      <div class="col-lg-6">
        <figure class="figure">
          <img
            src="{{ include.image | relative_url }}"
            class="img-fluid"
            alt="{{ include.page.image.alt }}"
            loading="lazy"
          />
          {% if include.caption %}
          <figcaption class="text-body-secondary mt-2">
            {{ include.caption }}
          </figcaption>
          {% endif %}
        </figure>
      </div>
 
      <div class="col-lg-6">
        <h3 class="display-5 fw-bold lh-1 mb-3">
          {{ include.title }}
        </h3>

        <p class="lead text-body-secondary">
          {{ include.description }}
        </p>
        <p class="lead text-body-secondary">
          {{ include.description-two }}
        </p>
      </div>

    </div>
  </div>
</section>
