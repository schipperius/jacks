<!-- Chapter Card -->
  <!-- Begin tabs for references -->
  <div class="card-footer"><!-- Begin card-footer-->
    <div class="my-4">
      <button class="btn btn-outline-dark btn-md" type="button" data-bs-toggle="collapse"
        data-bs-target="#research-{{ include.chapter.chapter_number }}">
        <i class="bi bi-book"></i> View Chapter {{ chapter.chapter_number }} Research
      </button>
    </div>
    <div class="collapse mt-3" id="research-{{ include.chapter.chapter_number }}">
      <div class="card card-body border-0 shadow-sm">
        <ul class="nav nav-tabs mb-3" id="pills-tab-{{ include.chapter.chapter_number }}" role="tablist">
          <li class="nav-item">
            <button class="nav-link active btn-sm" data-bs-toggle="pill"
              data-bs-target="#acad-{{ include.chapter.chapter_number }}">Academic</button>
          </li>
          <li class="nav-item">
            <button class="nav-link btn-sm" data-bs-toggle="pill"
              data-bs-target="#supp-{{ include.chapter.chapter_number }}">Narrative</button>
          </li>
          <li class="nav-item">
            <button class="nav-link btn-sm" data-bs-toggle="pill"
              data-bs-target="#visual-{{ include.chapter.chapter_number }}">Visuals</button>
          </li>
          <li class="nav-item">
            <button class="nav-link btn-sm" id="pills-method-tab-{{ post.slug }}" data-bs-toggle="pill"
              data-bs-target="#pills-method-{{ post.slug }}" type="button" role="tab">
              Visual Reconstruction
            </button>     
          </li>
        </ul>
        <div class="tab-content">
          <div class="tab-pane fade show active" id="acad-{{ include.chapter.chapter_number }}">
            {% include academic-list.html links=include.chapter.academic_refs %}
          </div>
          <div class="tab-pane fade" id="supp-{{ include.chapter.chapter_number }}">
            {% include bibliography.html links=include.chapter.references %}
          </div>
          <div class="tab-pane fade" id="visual-{{ include.chapter.chapter_number }}">
            {% include image-list.html links=include.chapter.image_refs %}
          </div>
          <div class="tab-pane fade" id="pills-method-{{ post.slug }}" role="tabpanel"
            aria-labelledby="pills-method-tab-{{ post.slug }}">
            <div class="p-3">
              {% include methodology.html %}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div><!-- End card-footer-->
</article>
