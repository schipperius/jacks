- id: ThothHill2025
  abstract: >-
    Thoth Hill is an archaeological site first dated to predynastic period
    located on the West Bank of Thebes approximately 3 kilometers north of the
    Valley of the Kings. A predynastic temple was built over by a mud-brick
    temple from the 11th Dynasty that is still visible today. The temple was
    dedicated to the god Horus. The site is the oldest known temple in Thebes.
