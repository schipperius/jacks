  title: >-
    English:  Al Qurn is the highest peak (420 m) in the Theban Hills, located
    on the western bank of the Nile, opposite modern Luxor. Its ancient name was
    Ta Dehent, or "the peak". Al Qurn is believed to be one of the entrances to
    the Duat (underworld). The whole Theban plateau was lifted up by the African
    faults, and then valleys cut down and the Nile excavated a large canyon.
    Theban Plateau, Theban Hills, Thebes, Luxor, Waset, Egypt.
  title-short: English
