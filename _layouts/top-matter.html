---
layout: default
---

{% assign d = site.data.plates | where: "image_id", page.image_id | first %}

<article class="container my-5">
  <div class="row g-5">

    <div class="col-lg-8">
      <div class="plate-frame border-gold p-2 shadow-lg">
        <img src="{{ d.image_path | relative_url }}" class="img-fluid w-100" alt="{{ d.image_alt }}">
      </div>
      <div class="mt-4 manuscript-text">
        <h1 class="display-5 archival-font">{{ d.image_title }}</h1>
        <p class="lead italic text-muted">{{ d.image_caption }}</p>
      </div>
    </div>
 
    <div class="col-4">
      <h1 class="display-5 fw-bold text-body-emphasis lh-1 mb-3">
        {{ page.title }}
      </h1>
      <p class="lead text-body-secondary">
        {{ page.para-1 }}
    </div>
  </div>
  </div>
  
  <hr>
  {{ content }}

  </div>
</article>
