---
layout: default
---
<!-- This determines how a single SCENE page looks.-->
<article class="card col-lg-8 mx-auto my-5 shadow-sm border-0">
  <div class="card-body text-center pt-5 pb-4">
    <h6 class="text-uppercase tracking-widest text-muted mb-2">Scene {{ scene.scene_number }}</h6>
    <h1 class="display-5 fw-bold">{{ scene.title }}</h1>
    <hr class="w-25 mx-auto">
  </div>
  <div class="card-body p-4 p-md-5 book-content drop-cap">
    {{ content }}
  </div>
</article>
