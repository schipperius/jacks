# Welcome to Jekyll!

# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

github_username: schipperius
url: "https://schipperius.github.io" # the base hostname & protocol for your site
baseurl: "/book-of-jack" # the subpath of your site, if you are using GitHub pages, this is usually the repository name
destination: ./_site # the destination directory for the generated site, default: ./_site

sup: the
title: Book of Jack
description: > 
  A collection of stories about the origin and development of the alphabet, 
  specifically through the lens of the letter J, 
  the name Jack and the phonemic sound shift from /j/ to /dʒ/.
author: Jack D'Vaspe
email: jackstonecreek@gmail.com

plugins:
  - jekyll-scholar
  - jekyll-feed
  # - jekyll-autoprefixer # Too many build errors, unable to resolve 2026-3-31
  - jekyll-sitemap
  - jekyll-seo-tag

scholar:
  last_name: first
  style: apa
  template: bib
  source: _data  # This tells the plugin WHERE to look
  data: references.bib # This tells the plugin WHAT file to open

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

# Add this line
collections_dir: _content

# Your existing collections block remains mostly the same
collections:
  chapters:
    output: true
    sort_by: chapter_number
    permalink: /chapter/:name/
  pages:
    output: true
    permalink: /:name/
  plates:
    output: true
    permalink: /plate/:name/
  scenes:
    output: true
    sort_by: scene_number
    permalink: /scene/:name/
  

# ===============================
# Includes / Extra Folders
# ===============================
# Only needed for folders that are NOT collections
# include:

# -----------------------------------------------------------------------------
# SASS settings
# -----------------------------------------------------------------------------

sass:
  sass_dir: _sass

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

# The markdown processor to use. Jekyll uses kramdown by default, but you can specify 
# another one if you like. For more information, see:
# https://jekyllrb.com/docs/configuration/options/#markdown-processor

markdown: kramdown

# -----------------------------------------------------------------------------
# Exclude settings
# -----------------------------------------------------------------------------
# Excludes - the following items will be excluded from processing, by default.
exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - .jekyll-cache/
  - .sass-cache/
  # (Everything else starting with '.' is ignored by default!)
