name: Link Checker

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Runs at 00:00 every Monday to catch links that broke since your last update
    - cron: '0 0 * * 1'

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Set up Ruby 💎
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2' # Match your local Ruby version
          bundler-cache: true

      - name: Build Site 🏗
        run: bundle exec jekyll build

      - name: HTMLProofer 🧐
        uses: athackst/htmlproofer-action@main
        continue-on-error: true # This allows the workflow to turn green while you fix links
        with:
          directory: ./_site
          # Optional: Add URLs to ignore (e.g., social media that often blocks bots)
          ignore_urls: |
            /twitter.com/
            /://linkedin.com


